name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'landing/**'
      - '.gemini/docegestar-assets/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages Folder
        run: |
          mkdir public
          cp landing/index.html public/
          mkdir -p public/.gemini
          cp -r .gemini/docegestar-assets public/.gemini/
          # Fix paths in index.html for root deployment
          # No changes needed if relative path ../.gemini is maintained in public/ folder structure

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
